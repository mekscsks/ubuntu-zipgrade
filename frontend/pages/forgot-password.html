<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - AI Exam Checker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/main.css">
  <script src="../config.js"></script>
</head>
<body>
<div class="auth-container">
  <div class="auth-card fade-in" style="max-width:400px">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:40px;margin-bottom:12px">🔑</div>
      <h1 style="font-size:22px;font-weight:700;color:#1E293B">Reset Password</h1>
      <p style="color:#64748B;font-size:14px;margin-top:4px">Enter your email to receive a reset link</p>
    </div>

    <div id="success-msg" style="display:none;background:#ECFDF5;border:1px solid #A7F3D0;border-radius:8px;padding:16px;text-align:center;color:#059669;font-size:14px">
      ✓ Reset link sent! Check your email inbox.
    </div>

    <div id="error-alert" style="display:none;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:12px;margin-bottom:16px;color:#DC2626;font-size:13px"></div>

    <form id="reset-form">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="teacher@school.com" required>
      </div>
      <button type="submit" id="reset-btn" class="btn btn-primary btn-lg" style="width:100%;justify-content:center">
        Send Reset Link
      </button>
    </form>

    <div style="text-align:center;margin-top:20px;font-size:13px;color:#64748B">
      <a href="login.html" style="color:#2563EB;font-weight:500">← Back to Sign In</a>
    </div>
  </div>
</div>
<script type="module">
  import { resetPassword } from '../assets/js/auth.js';
  import { setLoading } from '../assets/js/ui.js';

  document.getElementById('reset-form').onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const btn = document.getElementById('reset-btn');
    const errorAlert = document.getElementById('error-alert');
    errorAlert.style.display = 'none';

    setLoading(btn, true, 'Sending...');
    try {
      await resetPassword(email);
      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('success-msg').style.display = 'block';
    } catch (err) {
      errorAlert.textContent = err.message.includes('user-not-found') ? 'No account found with this email' : err.message;
      errorAlert.style.display = 'block';
      setLoading(btn, false, 'Send Reset Link');
    }
  };
</script>
</body>
</html>
