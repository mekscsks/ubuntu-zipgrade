<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Exam Checker</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563EB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ExamChecker">
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #EFF6FF, #F0F9FF); font-family: system-ui, sans-serif; }
    .loader { text-align: center; }
    .logo { width: 64px; height: 64px; background: linear-gradient(135deg, #2563EB, #7C3AED); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; color: #fff; font-weight: 800; font-size: 24px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #DBEAFE; border-top-color: #2563EB; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 16px auto 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="logo">AI</div>
    <p style="color: #64748B; font-size: 14px; margin: 0">Loading AI Exam Checker...</p>
    <div class="spinner"></div>
  </div>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    // Redirect based on auth state
    const token = localStorage.getItem('auth_token');
    setTimeout(() => {
      window.location.href = token ? '/pages/dashboard.html' : '/pages/login.html';
    }, 500);
  </script>
</body>
</html>
